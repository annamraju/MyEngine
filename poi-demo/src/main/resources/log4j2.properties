status = warn

appenders = console, rb2, rb1, rb, lf1, lf, lf2, cl

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n

appender.rb2.type = File
appender.rb2.name = CheckForDups
appender.rb2.fileName=c:\\logs\\CheckForDups.log
appender.rb2.layout.type=PatternLayout
appender.rb2.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.rb2.filter.threshold.type = ThresholdFilter
appender.rb2.filter.threshold.level = info

appender.rb1.type = File
appender.rb1.name = BofaCCLoad
appender.rb1.fileName=c:\\logs\\BofaCCLoad.log
appender.rb1.layout.type=PatternLayout
appender.rb1.layout.pattern= %msg%n
appender.rb1.filter.threshold.type = ThresholdFilter
appender.rb1.filter.threshold.level = info

appender.rb.type = File
appender.rb.name = READBALANCEFILE
appender.rb.fileName=c:\\logs\\ReadBalanceFile.log
appender.rb.layout.type=PatternLayout
appender.rb.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.rb.filter.threshold.type = ThresholdFilter
appender.rb.filter.threshold.level = info

appender.lf1.type = File
appender.lf1.name = LOGFILE1
appender.lf1.fileName=c:\\logs\\marcusdataprep.log
appender.lf1.layout.type=PatternLayout
appender.lf1.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.lf1.filter.threshold.type = ThresholdFilter
appender.lf1.filter.threshold.level = info

appender.lf.type = File
appender.lf.name = LOGFILE
appender.lf.fileName=c:\\logs\\MyRulesEngine.log
appender.lf.layout.type=PatternLayout
appender.lf.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.lf.filter.threshold.type = ThresholdFilter
appender.lf.filter.threshold.level = info

appender.lf2.type = File
appender.lf2.name = LedgerCategorization
appender.lf2.fileName=c:\\logs\\LedgerCategorization.log
appender.lf2.layout.type=PatternLayout
appender.lf2.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.lf2.filter.threshold.type = ThresholdFilter
appender.lf2.filter.threshold.level = info

appender.cl.type = File
appender.cl.name = CompositeLoad
appender.cl.fileName=c:\\logs\\CompositeLoad.log
appender.cl.layout.type=PatternLayout
appender.cl.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.cl.filter.threshold.type = ThresholdFilter
appender.cl.filter.threshold.level = info

# ===== Silence Apache POI formula evaluation debug logs =====
logger.poisformula.name = org.apache.poi.ss.formula
logger.poisformula.level = info

# ========== Root logger ==========
rootLogger.level = debug
rootLogger.appenderRefs = stdoutRef, rbRef, lf1Ref, lfRef, bfRef, rb2Ref, lf2Ref, clRef
rootLogger.appenderRef.stdoutRef.ref = STDOUT
rootLogger.appenderRef.rbRef.ref     = READBALANCEFILE
rootLogger.appenderRef.lf1Ref.ref    = LOGFILE1
rootLogger.appenderRef.lfRef.ref    = LOGFILE
rootLogger.appenderRef.bfRef.ref    = BofaCCLoad
rootLogger.appenderRef.rb2Ref.ref    = CheckForDups
rootLogger.appenderRef.lf2Ref.ref    = LedgerCategorization
rootLogger.appenderRef.clRef.ref    = CompositeLoad
